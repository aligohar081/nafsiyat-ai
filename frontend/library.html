                content_english: `<h2>What is Anxiety?</h2>
<p>Anxiety is a normal human emotion that everyone experiences at times. Many people feel anxious when facing problems at work, before taking a test, or making important decisions. However, anxiety disorders are different. They are a group of mental illnesses that cause constant and overwhelming anxiety and fear.</p>

<h3>Common Symptoms of Anxiety Disorders:</h3>
<ul>
<li><strong>Physical symptoms:</strong> Racing heart, shortness of breath, sweating, trembling, fatigue, headaches, muscle tension</li>
<li><strong>Psychological symptoms:</strong> Excessive worry, racing thoughts, difficulty concentrating, irritability, restlessness</li>
<li><strong>Behavioral symptoms:</strong> Avoiding situations that trigger anxiety, seeking reassurance, difficulty sleeping</li>
</ul>

<h3>Evidence-Based Treatments for Anxiety:</h3>
<p><strong>Cognitive Behavioral Therapy (CBT):</strong> CBT is the gold-standard treatment for anxiety disorders. It helps you identify and change negative thought patterns and behaviors that maintain anxiety. Research shows that 60-80% of people with anxiety disorders improve significantly with CBT.</p>

<p><strong>Medication:</strong> Selective Serotonin Reuptake Inhibitors (SSRIs) and Serotonin-Norepinephrine Reuptake Inhibitors (SNRIs) are commonly prescribed for anxiety disorders. These medications work by balancing brain chemicals that affect mood.</p>

<p><strong>Mindfulness-Based Stress Reduction (MBSR):</strong> This 8-week program combines mindfulness meditation and yoga to reduce anxiety and improve emotional regulation.</p>

<h3>Self-Help Strategies You Can Start Today:</h3>
<ul>
<li><strong>Deep Breathing:</strong> Practice the 4-7-8 technique - inhale for 4 seconds, hold for 7 seconds, exhale for 8 seconds</li>
<li><strong>Progressive Muscle Relaxation:</strong> Tense and relax each muscle group from your toes to your head</li>
<li><strong>Regular Exercise:</strong> 30 minutes of moderate exercise 5 days a week can reduce anxiety significantly</li>

<li><strong>Maintain a Sleep Schedule:</strong> Aim for 7-9 hours of quality sleep per night</li>

                content_english: `<h2>What is Depression?</h2>
<p>Depression (major depressive disorder) is a common and serious medical illness that negatively affects how you feel, the way you think, and how you act. Fortunately, it is also treatable. Depression causes feelings of sadness and/or a loss of interest in activities you once enjoyed.</p>

<h3>Signs and Symptoms of Depression:</h3>

<li>Persistent sad, anxious, or "empty" mood</li>

<li>Loss of interest or pleasure in hobbies and activities</li>

<p><strong>Lifestyle Changes:</strong> Regular exercise, healthy diet, adequate sleep, and social connection are crucial for recovery.</p>

<p>Stress is your body's response to demands or threats. While short-term stress can be helpful, chronic stress can have serious negative effects on your physical and mental health.</p>

<h3>Proven Stress Management Techniques:</h3>
<p><strong>1. Mindfulness Meditation:</strong> Practice focusing on your breath for 5-10 minutes daily.</p>

        // Get auth token
        function getAuthToken() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = 'index.html';
            }
            return token;
        }

        // Load content from local data
        function loadContent() {
            const container = document.getElementById('contentGrid');
            container.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading wellness content...</p></div>';
            
            const category = document.getElementById('categoryFilter').value;
            const type = document.getElementById('typeFilter').value;
            const search = document.getElementById('searchInput').value.toLowerCase();
            
            let filtered = [...articlesData];
            
            if (category) {
                filtered = filtered.filter(item => item.category === category);
            }
            
            if (type) {
                filtered = filtered.filter(item => item.type === type);
            }
            
            if (search) {
                filtered = filtered.filter(item => 
                    item.title.toLowerCase().includes(search) || 
                    item.title_urdu.toLowerCase().includes(search) ||
                    item.tags.some(tag => tag.toLowerCase().includes(search))
                );
            }
            
            if (filtered.length === 0) {
                container.innerHTML = '<div class="no-data"><i class="fas fa-book" style="font-size: 3rem; margin-bottom: 1rem; display: block;"></i>No content found.<br>Try different filters or search terms!</div>';
            } else {
                container.innerHTML = filtered.map(content => `
                    <div class="content-card" onclick="viewContent(${content.id})">
                        <div class="content-image">
                            <i class="${content.image_icon}"></i>
                            <span class="content-type">${content.type}</span>
                        </div>
                        <div class="content-info">
                            <h3>${escapeHtml(currentLanguage === 'english' ? content.title : content.title_urdu)}</h3>
                            <div class="content-meta">
                                <span><i class="fas fa-tag"></i> ${content.category}</span>
                                <span><i class="fas fa-eye"></i> ${content.views} views</span>
                            </div>
                        </div>
                    </div>
                `).join('');
            }
        }

        function viewContent(contentId) {
            const content = articlesData.find(c => c.id === contentId);
            if (!content) return;
            
            content.views++;
            
            const isEnglish = currentLanguage === 'english';
            const detailHtml = `
                <div class="content-detail">
                    <div class="content-detail-header">
                        <h1>${escapeHtml(isEnglish ? content.title : content.title_urdu)}</h1>
                        <div class="content-detail-meta">
                            <span><i class="fas fa-tag"></i> ${content.category}</span>
                            <span><i class="fas fa-eye"></i> ${content.views} views</span>
                        </div>
                    </div>
                    <div class="content-detail-body ${!isEnglish ? 'urdu-text' : ''}">
                        ${isEnglish ? content.content_english : content.content_urdu}
                    </div>
                    <div class="content-tags">
                        ${content.tags.map(tag => `<span class="tag">#${tag}</span>`).join('')}
                    </div>
                </div>
            `;
            
            document.getElementById('contentDetail').innerHTML = detailHtml;
            document.getElementById('contentModal').style.display = 'flex';
        }

        function filterContent() {
            loadContent();
        }

        function searchContent() {
            clearTimeout(window.searchTimeout);
            window.searchTimeout = setTimeout(() => {
                loadContent();
            }, 500);
        }

        function setLanguage(language) {
            currentLanguage = language;
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            loadContent();
        }

        function closeContentModal() {
            document.getElementById('contentModal').style.display = 'none';
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('username');
            window.location.href = 'index.html';
        }

        // Load user name
        async function loadUserName() {
            try {
                const response = await fetch(`${API_URL}/auth/me`, {
                    headers: { 'Authorization': `Bearer ${getAuthToken()}` }
                });
                if (response.ok) {
                    const user = await response.json();
                    const displayName = user.full_name || user.username;
                    document.getElementById('userNameDisplay').textContent = displayName;
                }
            } catch (error) {
                console.error('Error loading user:', error);
            }
        }

        // Load initial content
        loadUserName();
        loadContent();
    </script>
</body>
</html>
