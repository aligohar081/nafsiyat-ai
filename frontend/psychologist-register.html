<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Psychologist Registration - Nafsiyat AI</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .register-container {
            max-width: 650px;
            margin: 2rem auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        .register-header {
            background: linear-gradient(135deg, #1B2B4E 0%, #2A3D62 100%);
            padding: 2rem;
            text-align: center;
            color: white;
        }
        
        .register-header h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }
        
        .register-header p {
            opacity: 0.9;
        }
        
        .register-form {
            padding: 2rem;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        
        .profile-upload {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        
        .profile-preview {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #f5f5f7;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            overflow: hidden;
            cursor: pointer;
            border: 2px dashed #DAA520;
        }
        
        .profile-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .profile-preview i {
            font-size: 3rem;
            color: #6c6c7a;
        }
        
        .file-input {
            display: none;
        }
        
        .upload-btn {
            background: #f5f5f7;
            border: 1px solid #e8e8ec;
            padding: 0.5rem 1rem;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.85rem;
        }
        
        .back-link {
            text-align: center;
            margin-top: 1.5rem;
        }
        
        .back-link a {
            color: #DAA520;
            text-decoration: none;
        }
        
        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .register-container {
                margin: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-header">
            <i class="fas fa-user-md" style="font-size: 3rem; margin-bottom: 1rem;"></i>
            <h1>Psychologist Registration</h1>
            <p>Join our platform and help others with your expertise</p>
        </div>
        
        <div class="register-form">
            <form id="psychologistRegisterForm" enctype="multipart/form-data">
                <!-- Profile Picture Upload -->
                <div class="profile-upload">
                    <div class="profile-preview" onclick="document.getElementById('profilePicture').click()">
                        <i class="fas fa-camera"></i>
                        <img id="profilePreview" style="display: none;">
                    </div>
                    <input type="file" id="profilePicture" class="file-input" accept="image/*" onchange="previewImage(this)">
                    <div>
                        <button type="button" class="upload-btn" onclick="document.getElementById('profilePicture').click()">
                            <i class="fas fa-upload"></i> Upload Profile Picture
                        </button>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Full Name *</label>
                    <input type="text" id="fullName" required placeholder="Dr. John Doe">
                </div>
                
                <div class="form-group">
                    <label>Username *</label>
                    <input type="text" id="username" required placeholder="Choose a username">
                </div>
                
                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" id="email" required placeholder="doctor@example.com">
                </div>
                
                <div class="form-group">
                    <label>Password *</label>
                    <input type="password" id="password" required placeholder="Create a strong password">
                </div>
                
                <div class="form-group">
                    <label>Specialization *</label>
                    <select id="specialization" required>
                        <option value="">Select Specialization</option>
                        <option value="Clinical Psychology">Clinical Psychology</option>
                        <option value="Counseling Psychology">Counseling Psychology</option>
                        <option value="Psychiatry">Psychiatry</option>
                        <option value="CBT Specialist">CBT Specialist</option>
                        <option value="Child Psychology">Child Psychology</option>
                        <option value="Trauma Specialist">Trauma Specialist</option>
                        <option value="Addiction Counseling">Addiction Counseling</option>
                        <option value="Marriage Counseling">Marriage Counseling</option>
                        <option value="Neuropsychology">Neuropsychology</option>
                        <option value="Health Psychology">Health Psychology</option>
                    </select>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Years of Experience *</label>
                        <input type="number" id="experience" required placeholder="Years" min="0" max="50">
                    </div>
                    <div class="form-group">
                        <label>License Number *</label>
                        <input type="text" id="licenseNumber" required placeholder="PMC-XXXXX">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Education (Degree & Institution) *</label>
                    <input type="text" id="education" required placeholder="e.g., PhD in Clinical Psychology from University of Karachi">
                </div>
                
                <div class="form-group">
                    <label>Consultation Fee (PKR per hour) *</label>
                    <input type="number" id="consultationFee" required placeholder="e.g., 2500" min="500">
                </div>
                
                <div class="form-group">
                    <label>Bio / About Me</label>
                    <textarea id="bio" rows="4" placeholder="Tell patients about your approach, experience, and what they can expect from your sessions..."></textarea>
                </div>
                
                <button type="submit" class="btn-primary btn-block" style="padding: 1rem;">
                    <i class="fas fa-user-md"></i> Register as Psychologist
                </button>
                
                <div class="back-link">
                    <a href="index.html">← Back to Login</a>
                </div>
            </form>
        </div>
    </div>
    
    <script src="js/config.js"></script>
    <script>
        const API_URL = window.API_URL || 'http://localhost:8000/api';
        
        function previewImage(input) {
            const preview = document.getElementById('profilePreview');
            const icon = preview.querySelector('i');
            
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    preview.innerHTML = '';
                    preview.appendChild(img);
                }
                reader.readAsDataURL(input.files[0]);
            }
        }
        
        // Load pre-filled data from session storage
        const storedData = sessionStorage.getItem('psychologistData');
        if (storedData) {
            const data = JSON.parse(storedData);
            document.getElementById('fullName').value = data.full_name || '';
            document.getElementById('username').value = data.username || '';
            document.getElementById('email').value = data.email || '';
            document.getElementById('password').value = data.password || '';
            sessionStorage.removeItem('psychologistData');
        }
        
        document.getElementById('psychologistRegisterForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData();
            formData.append('full_name', document.getElementById('fullName').value);
            formData.append('username', document.getElementById('username').value);
            formData.append('email', document.getElementById('email').value);
            formData.append('password', document.getElementById('password').value);
            formData.append('specialization', document.getElementById('specialization').value);
            formData.append('years_of_experience', document.getElementById('experience').value);
            formData.append('education', document.getElementById('education').value);
            formData.append('consultation_fee', document.getElementById('consultationFee').value);
            formData.append('license_number', document.getElementById('licenseNumber').value);
            formData.append('bio', document.getElementById('bio').value);
            
            const profilePic = document.getElementById('profilePicture').files[0];
            if (profilePic) {
                formData.append('profile_picture', profilePic);
            }
            
            const submitBtn = document.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Registering...';
            submitBtn.disabled = true;
            
            try {
                const response = await fetch(`${API_URL}/auth/register-psychologist`, {
                    method: 'POST',
                    body: formData
                });
                
                if (response.ok) {
                    alert('🎉 Psychologist registration successful! Please login to continue.');
                    window.location.href = 'index.html';
                } else {
                    const error = await response.json();
                    alert('Registration failed: ' + (error.detail || 'Please try again'));
                }
            } catch (error) {
                console.error('Registration error:', error);
                alert('Network error. Please try again.');
            } finally {
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
